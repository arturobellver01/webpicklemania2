<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprende Pickleball | Guías reales para jugar mejor | Picklemania</title>
  <meta name="description" content="Biblioteca editorial de Picklemania con artículos completos sobre reglas, técnica, medidas y fundamentos del pickleball actual.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Montserrat', 'sans-serif']
          },
          colors: {
            brand: {
              black: '#0f1112',
              gray: '#6a716d',
              light: '#f3f4f2'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-brand-black antialiased">
  <header></header>

  <main class="py-16">
    <section class="container mx-auto px-4 space-y-10">
      <div class="reveal max-w-4xl">
        <p class="eyebrow mb-3">Aprende Pickleball</p>
        <h1 class="text-4xl md:text-6xl font-display font-black mb-5">Contenido editorial útil para jugar con más criterio</h1>
        <p class="text-brand-gray text-lg">Aquí no encontrarás artículos de relleno: publicamos guías completas para entender reglas, mejorar decisiones en pista y progresar con base real en normativa RFET.</p>
      </div>

      <div id="article-filters" class="flex flex-wrap gap-2">
        <button class="px-4 py-2 rounded-full border border-black/10 bg-brand-black text-white" data-filter="all">Todo</button>
        <button class="px-4 py-2 rounded-full border border-black/10" data-filter="fundamentos">Fundamentos</button>
        <button class="px-4 py-2 rounded-full border border-black/10" data-filter="reglas">Reglas</button>
        <button class="px-4 py-2 rounded-full border border-black/10" data-filter="tecnica">Técnica</button>
      </div>

      <div id="articles-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>
  </main>

  <footer></footer>

  <script src="js/articles.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
