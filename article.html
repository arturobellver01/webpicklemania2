<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo — Academia Picklemania</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            black: '#0c0c0d',
                            gray: '#5b5b66',
                            light: '#f5f5f6',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-white text-brand-black antialiased">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-black/5">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-full bg-brand-black"></div>
                <span class="font-display font-extrabold text-xl tracking-tighter uppercase">Picklemania</span>
            </a>
            <a href="index.html#aprende" class="text-sm font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Volver a Academia
            </a>
        </div>
    </header>

    <main class="py-24">
        <div class="container mx-auto px-4 max-w-4xl">
            <div id="article-content" class="space-y-12 reveal active">
                <!-- Injected by JS -->
                <div class="animate-pulse space-y-8">
                    <div class="h-12 bg-brand-light rounded-2xl w-3/4"></div>
                    <div class="h-64 bg-brand-light rounded-[3rem]"></div>
                    <div class="space-y-4">
                        <div class="h-4 bg-brand-light rounded w-full"></div>
                        <div class="h-4 bg-brand-light rounded w-full"></div>
                        <div class="h-4 bg-brand-light rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-black/5 py-10">
        <div class="container mx-auto px-4 text-center">
            <p class="text-xs text-brand-gray">© 2026 Picklemania. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="js/articles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const content = document.getElementById('article-content');
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            const article = window.PICKLEMANIA_ARTICLES.find(a => a.id === id) || window.PICKLEMANIA_ARTICLES[0];
            
            if (article) {
                content.innerHTML = `
                    <div class="space-y-6">
                        <span class="bg-brand-black text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full">${article.category}</span>
                        <h1 class="text-5xl md:text-7xl font-display font-black leading-tight">${article.title}</h1>
                        <div class="flex items-center gap-4 text-sm text-brand-gray font-medium">
                            <span>${article.minutes} min de lectura</span>
                            <span>•</span>
                            <span>Publicado el ${article.date}</span>
                        </div>
                    </div>
                    <div class="aspect-video rounded-[3rem] bg-brand-light flex items-center justify-center border border-black/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-10"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    </div>
                    <div class="prose prose-lg max-w-none text-brand-gray leading-relaxed space-y-6">
                        <p class="text-xl text-brand-black font-medium">${article.excerpt}</p>
                        <p>${article.content}</p>
                        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
                        <h2 class="text-3xl font-display font-bold text-brand-black pt-8">Conclusión</h2>
                        <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>
                    </div>
                    <div class="pt-12 border-t border-black/5">
                        <a href="index.html#coleccion" class="bg-brand-black text-white px-8 py-4 rounded-2xl font-bold inline-flex items-center gap-2">
                            Ver palas recomendadas <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                        </a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
